[project]
name = "skillager"
version = "0.1.2"
description = "A Python environment skill registry and activation layer for coding agents."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Skillager Contributors" }]
keywords = ["agents", "skills", "codex", "claude", "llm"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development",
]
dependencies = [
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
]

[project.optional-dependencies]
test = []

[project.scripts]
skillager = "skillager.cli:main"

[build-system]
requires = []
build-backend = "_skillager_build"
backend-path = ["build_backend"]

[tool.uv]
package = true

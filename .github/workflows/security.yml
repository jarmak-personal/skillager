name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/dependency-review-action@v4.9.0

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: github/codeql-action/init@v4.35.4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4.35.4

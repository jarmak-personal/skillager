name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type. current only tags; patch/minor/major push a version commit to main.
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.next }}
      linter_version: ${{ steps.version.outputs.linter }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Preflight release services
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def fetch_json(url, *, headers=None):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "User-Agent": "skillager-release-workflow",
                      **(headers or {}),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def fetch_probe(url, *, headers=None):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "skillager-release-workflow",
                      **(headers or {}),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  response.read(1)

          def require_green_statuspage(name, url):
              payload = fetch_json(url)
              status = payload.get("status", {})
              indicator = status.get("indicator")
              description = status.get("description", "unknown")
              if indicator != "none":
                  raise SystemExit(f"{name} status is not green: {indicator} ({description})")
              print(f"{name} status: {description}")

          def require_operational_components(name, url, selector):
              # Python status has no PyPI-only aggregate. Keep this fail-closed if
              # component names drift so the release owner can update the matcher.
              payload = fetch_json(url)
              components = [
                  component
                  for component in payload.get("components", [])
                  if selector(component.get("name", ""))
              ]
              if not components:
                  raise SystemExit(f"{name} status check found no matching components")
              degraded = [
                  f"{component.get('name')}={component.get('status')}"
                  for component in components
                  if component.get("status") != "operational"
              ]
              if degraded:
                  raise SystemExit(f"{name} status is not green: {', '.join(degraded)}")
              print(f"{name} status: {len(components)} relevant components operational")

          def require_probe(name, url, *, headers=None):
              try:
                  fetch_probe(url, headers=headers)
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f"{name} probe failed with HTTP {exc.code}") from exc
              except urllib.error.URLError as exc:
                  raise SystemExit(f"{name} probe failed: {exc.reason}") from exc
              print(f"{name} probe: ok")

          github_headers = {"Accept": "application/vnd.github+json"}
          token = os.environ.get("GH_TOKEN")
          if token:
              github_headers["Authorization"] = f"Bearer {token}"

          require_green_statuspage("GitHub", "https://www.githubstatus.com/api/v2/summary.json")
          require_operational_components(
              "PyPI",
              "https://status.python.org/api/v2/summary.json",
              lambda component_name: component_name == "PyPI"
              or component_name.startswith("pypi.org -")
              or component_name.startswith("files.pythonhosted.org -"),
          )
          require_probe("GitHub API", "https://api.github.com/rate_limit", headers=github_headers)
          require_probe("PyPI API", "https://pypi.org/simple/")
          PY

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(python3 - <<'PY'
          import pathlib
          text = pathlib.Path("src/skillager/__init__.py").read_text(encoding="utf-8")
          for line in text.splitlines():
              if line.startswith("__version__"):
                  print(line.split("=", 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit("could not find __version__")
          PY
          )
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          NEXT=$(python3 - <<PY
          major, minor, patch = [int(part) for part in "$CURRENT".split(".")]
          bump = "${{ inputs.bump }}"
          if bump == "current":
              pass
          elif bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1
          print(f"{major}.{minor}.{patch}")
          PY
          )
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          LINTER_VERSION=$(python3 - <<'PY'
          import pathlib
          text = pathlib.Path("packages/skillager-linter/pyproject.toml").read_text(encoding="utf-8")
          for line in text.splitlines():
              if line.startswith("version = "):
                  print(line.split("=", 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit("could not find linter version")
          PY
          )
          echo "linter=$LINTER_VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $CURRENT -> $NEXT (${{ inputs.bump }})" >> "$GITHUB_STEP_SUMMARY"
          echo "### skillager-linter: $LINTER_VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Reuse existing current release tag
        if: inputs.bump == 'current'
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          tag="v$NEXT"
          remote_tag_sha=$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')
          fi

          if [ -n "$remote_tag_sha" ]; then
            git checkout --detach "$remote_tag_sha"
            echo "Reusing existing $tag at $remote_tag_sha"
          else
            echo "$tag does not exist yet; release will tag the current commit"
          fi

      - name: Update version files
        env:
          CURRENT: ${{ steps.version.outputs.current }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib

          current = os.environ["CURRENT"]
          next_version = os.environ["NEXT"]
          replacements = {
              "pyproject.toml": [(f'version = "{current}"', f'version = "{next_version}"')],
              "src/skillager/__init__.py": [(f'__version__ = "{current}"', f'__version__ = "{next_version}"')],
          }
          for filename, pairs in replacements.items():
              path = pathlib.Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f"missing expected version string in {filename}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Validate release build
        run: |
          rm -rf dist
          uv run python -m unittest discover -s tests
          uv run python -m unittest discover -s packages/skillager-linter/tests
          uv run python -m skillager --version
          uv run python -m skillager_linter --version
          uv build packages/skillager-linter
          uv build
          uv run python scripts/check_wheelhouse.py --python 3.12
          ls -lh dist/

      - name: Commit version bump and tag
        env:
          CURRENT: ${{ steps.version.outputs.current }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/skillager/__init__.py
          if git diff --cached --quiet; then
            echo "No version bump commit needed for $NEXT"
          else
            git commit -m "Bump version to $NEXT"
          fi

          tag="v$NEXT"
          head_sha=$(git rev-parse HEAD)
          remote_tag_sha=$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')
          fi

          if [ -n "$remote_tag_sha" ] && [ "$remote_tag_sha" != "$head_sha" ]; then
            echo "::error::$tag already exists at $remote_tag_sha, but release HEAD is $head_sha"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            local_tag_sha=$(git rev-list -n 1 "$tag")
            if [ "$local_tag_sha" != "$head_sha" ]; then
              echo "::error::local $tag points at $local_tag_sha, but release HEAD is $head_sha"
              exit 1
            fi
            echo "$tag already exists locally at release HEAD"
          else
            git tag "$tag" "$head_sha"
          fi

          if [ "$NEXT" != "$CURRENT" ]; then
            git push origin HEAD:main
          fi

          if [ -z "$remote_tag_sha" ]; then
            git push origin "v$NEXT"
          else
            echo "$tag already exists on origin at release HEAD; skipping tag push"
          fi

      - name: Build release notes from commit subjects
        env:
          NEXT: ${{ steps.version.outputs.next }}
          LINTER_VERSION: ${{ steps.version.outputs.linter }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          NOTES=$(git log --pretty=format:'- %s' "$RANGE" | grep -v '^- Bump version to' || true)
          if [ -z "$NOTES" ]; then
            NOTES="- Initial release"
          fi
          {
            echo "Packages:"
            echo "- skillager $NEXT"
            echo "- skillager-linter $LINTER_VERSION"
            echo
            echo "Private API note:"
            echo "- Compatibility shims remain for existing imports from skillager.skills.simple_yaml and skillager.skills.lint; new integrations should import from skillager_linter."
            echo
            echo "Changes:"
            printf '%s\n' "$NOTES"
          } > RELEASE_NOTES.md

      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          gh_api_retry() {
            attempt=1
            while true; do
              if gh api "$@"; then
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep_seconds=$((attempt * 10))
              echo "gh api failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id_for_tag() {
            lookup_tag="$1"
            attempt=1
            while true; do
              error_file=$(mktemp)
              if release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$lookup_tag" --jq .id 2>"$error_file"); then
                rm -f "$error_file"
                printf '%s\n' "$release_id"
                return 0
              fi
              if grep -q "HTTP 404" "$error_file"; then
                rm -f "$error_file"
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                cat "$error_file" >&2
                rm -f "$error_file"
                return 1
              fi
              cat "$error_file" >&2
              rm -f "$error_file"
              sleep_seconds=$((attempt * 10))
              echo "Release lookup failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          tag="v$NEXT"
          release_id=$(release_id_for_tag "$tag")
          if [ -n "$release_id" ]; then
            gh_api_retry --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f name="$tag" \
              -F body=@RELEASE_NOTES.md \
              --silent
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file RELEASE_NOTES.md \
              --draft
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release-assets:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.release.outputs.version }}" dist/* --repo "$GITHUB_REPOSITORY" --clobber

  publish-linter-pypi:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skillager-linter
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Select linter artifacts
        env:
          VERSION: ${{ needs.release.outputs.linter_version }}
        run: |
          mkdir dist-linter
          cp "dist/skillager_linter-${VERSION}"* dist-linter/
          test "$(find dist-linter -type f | wc -l)" -eq 2

      - name: Check whether version is already on PyPI
        id: pypi
        env:
          PACKAGE: skillager-linter
          VERSION: ${{ needs.release.outputs.linter_version }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.request

          package = os.environ["PACKAGE"]
          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/{package}/{version}/json"
          exists = False
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"exists={str(exists).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY

      - name: Publish to PyPI
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist-linter/

  publish-pypi:
    needs:
      - release
      - publish-linter-pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skillager
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Select core artifacts
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir dist-core
          cp "dist/skillager-${VERSION}"* dist-core/
          test "$(find dist-core -type f | wc -l)" -eq 2

      - name: Check whether version is already on PyPI
        id: pypi
        env:
          PACKAGE: skillager
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.request

          package = os.environ["PACKAGE"]
          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/{package}/{version}/json"
          exists = False
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"exists={str(exists).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY

      - name: Publish to PyPI
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist-core/

  publish-github-release:
    needs:
      - release
      - release-assets
      - publish-linter-pypi
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh_api_retry() {
            attempt=1
            while true; do
              if gh api "$@"; then
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep_seconds=$((attempt * 10))
              echo "gh api failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id_for_tag() {
            lookup_tag="$1"
            attempt=1
            while true; do
              error_file=$(mktemp)
              if release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$lookup_tag" --jq .id 2>"$error_file"); then
                rm -f "$error_file"
                printf '%s\n' "$release_id"
                return 0
              fi
              if grep -q "HTTP 404" "$error_file"; then
                rm -f "$error_file"
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                cat "$error_file" >&2
                rm -f "$error_file"
                return 1
              fi
              cat "$error_file" >&2
              rm -f "$error_file"
              sleep_seconds=$((attempt * 10))
              echo "Release lookup failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id=$(release_id_for_tag "v$VERSION")
          if [ -z "$release_id" ]; then
            echo "::error::GitHub Release v$VERSION does not exist"
            exit 1
          fi

          gh_api_retry --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false \
            -f make_latest=true \
            --silent

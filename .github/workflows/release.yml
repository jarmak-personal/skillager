name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release.
        required: true
        type: choice
        options:
          - skillager
          - skillager-linter
        default: skillager
      bump:
        description: Version bump type. current only tags; patch/minor/major push a version commit to main.
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.version.outputs.package }}
      version: ${{ steps.version.outputs.next }}
      tag: ${{ steps.version.outputs.tag }}
      dist_prefix: ${{ steps.version.outputs.dist_prefix }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Preflight release services
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def fetch_json(url, *, headers=None):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "User-Agent": "skillager-release-workflow",
                      **(headers or {}),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def fetch_probe(url, *, headers=None):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "skillager-release-workflow",
                      **(headers or {}),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  response.read(1)

          def require_green_statuspage(name, url):
              payload = fetch_json(url)
              status = payload.get("status", {})
              indicator = status.get("indicator")
              description = status.get("description", "unknown")
              if indicator != "none":
                  raise SystemExit(f"{name} status is not green: {indicator} ({description})")
              print(f"{name} status: {description}")

          def require_operational_components(name, url, selector):
              # Python status has no PyPI-only aggregate. Keep this fail-closed if
              # component names drift so the release owner can update the matcher.
              payload = fetch_json(url)
              components = [
                  component
                  for component in payload.get("components", [])
                  if selector(component.get("name", ""))
              ]
              if not components:
                  raise SystemExit(f"{name} status check found no matching components")
              degraded = [
                  f"{component.get('name')}={component.get('status')}"
                  for component in components
                  if component.get("status") != "operational"
              ]
              if degraded:
                  raise SystemExit(f"{name} status is not green: {', '.join(degraded)}")
              print(f"{name} status: {len(components)} relevant components operational")

          def require_probe(name, url, *, headers=None):
              try:
                  fetch_probe(url, headers=headers)
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f"{name} probe failed with HTTP {exc.code}") from exc
              except urllib.error.URLError as exc:
                  raise SystemExit(f"{name} probe failed: {exc.reason}") from exc
              print(f"{name} probe: ok")

          github_headers = {"Accept": "application/vnd.github+json"}
          token = os.environ.get("GH_TOKEN")
          if token:
              github_headers["Authorization"] = f"Bearer {token}"

          require_green_statuspage("GitHub", "https://www.githubstatus.com/api/v2/summary.json")
          require_operational_components(
              "PyPI",
              "https://status.python.org/api/v2/summary.json",
              lambda component_name: component_name == "PyPI"
              or component_name.startswith("pypi.org -")
              or component_name.startswith("files.pythonhosted.org -"),
          )
          require_probe("GitHub API", "https://api.github.com/rate_limit", headers=github_headers)
          require_probe("PyPI API", "https://pypi.org/simple/")
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Compute next version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          package = "${{ inputs.package }}"
          bump = "${{ inputs.bump }}"
          packages = {
              "skillager": {
                  "pyproject": "pyproject.toml",
                  "init": "src/skillager/__init__.py",
                  "tag_prefix": "v",
                  "tag_pattern": "v[0-9]*",
                  "dist_prefix": "skillager",
                  "release_title_prefix": "v",
              },
              "skillager-linter": {
                  "pyproject": "packages/skillager-linter/pyproject.toml",
                  "init": "packages/skillager-linter/src/skillager_linter/__init__.py",
                  "tag_prefix": "skillager-linter-v",
                  "tag_pattern": "skillager-linter-v[0-9]*",
                  "dist_prefix": "skillager_linter",
                  "release_title_prefix": "skillager-linter v",
              },
          }
          if package not in packages:
              raise SystemExit(f"unsupported package: {package}")
          config = packages[package]

          pyproject = pathlib.Path(config["pyproject"])
          init_file = pathlib.Path(config["init"])
          pyproject_match = re.search(r'^version = "([^"]+)"$', pyproject.read_text(encoding="utf-8"), re.MULTILINE)
          init_match = re.search(r'^__version__ = "([^"]+)"$', init_file.read_text(encoding="utf-8"), re.MULTILINE)
          if not pyproject_match:
              raise SystemExit(f"could not find project version in {pyproject}")
          if not init_match:
              raise SystemExit(f"could not find __version__ in {init_file}")
          current = pyproject_match.group(1)
          if init_match.group(1) != current:
              raise SystemExit(f"{pyproject} and {init_file} disagree on version")

          major, minor, patch = [int(part) for part in current.split(".")]
          if bump == "current":
              pass
          elif bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1
          next_version = f"{major}.{minor}.{patch}"
          tag = f"{config['tag_prefix']}{next_version}"
          release_title = f"{config['release_title_prefix']}{next_version}"

          outputs = {
              "package": package,
              "current": current,
              "next": next_version,
              "tag": tag,
              "tag_pattern": config["tag_pattern"],
              "dist_prefix": config["dist_prefix"],
              "pyproject": config["pyproject"],
              "init": config["init"],
              "release_title": release_title,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in outputs.items():
                  output.write(f"{key}={value}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write(f"### Package: {package}\n")
              summary.write(f"### Version bump: {current} -> {next_version} ({bump})\n")
          PY

      - name: Reuse existing current release tag
        if: inputs.bump == 'current'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
          fi

          if [ -n "$remote_tag_sha" ]; then
            git checkout --detach "$remote_tag_sha"
            echo "Reusing existing $TAG at $remote_tag_sha"
          else
            echo "$TAG does not exist yet; release will tag the current commit"
          fi

      - name: Update version files
        if: inputs.bump != 'current'
        env:
          CURRENT: ${{ steps.version.outputs.current }}
          NEXT: ${{ steps.version.outputs.next }}
          PYPROJECT: ${{ steps.version.outputs.pyproject }}
          INIT: ${{ steps.version.outputs.init }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib

          current = os.environ["CURRENT"]
          next_version = os.environ["NEXT"]
          replacements = {
              os.environ["PYPROJECT"]: [(f'version = "{current}"', f'version = "{next_version}"')],
              os.environ["INIT"]: [(f'__version__ = "{current}"', f'__version__ = "{next_version}"')],
          }
          for filename, pairs in replacements.items():
              path = pathlib.Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f"missing expected version string in {filename}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY
          uv lock

      - name: Validate release build
        env:
          PACKAGE: ${{ steps.version.outputs.package }}
        run: |
          rm -rf dist
          if [ "$PACKAGE" = "skillager" ]; then
            uv run mypy --python-version 3.10 src/skillager
            uv run mypy --python-version 3.10 packages/skillager-linter/src/skillager_linter
            uv run python -m unittest discover -s tests
            uv run python -m unittest discover -s packages/skillager-linter/tests
            uv run python -m skillager --version
            uv run python -m skillager_linter --version
            uv build packages/skillager-linter
            uv build
            uv run python scripts/check_wheelhouse.py --python 3.12
          else
            uv run mypy --python-version 3.10 packages/skillager-linter/src/skillager_linter
            uv run python -m unittest discover -s packages/skillager-linter/tests
            uv run python -m skillager_linter --version
            uv build packages/skillager-linter
          fi
          ls -lh dist/

      - name: Commit version bump and tag
        env:
          PACKAGE: ${{ steps.version.outputs.package }}
          CURRENT: ${{ steps.version.outputs.current }}
          NEXT: ${{ steps.version.outputs.next }}
          TAG: ${{ steps.version.outputs.tag }}
          PYPROJECT: ${{ steps.version.outputs.pyproject }}
          INIT: ${{ steps.version.outputs.init }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PYPROJECT" "$INIT" uv.lock
          committed=false
          if git diff --cached --quiet; then
            echo "No version bump commit needed for $NEXT"
          else
            git commit -m "Bump $PACKAGE to $NEXT"
            committed=true
          fi

          head_sha=$(git rev-parse HEAD)
          remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
          fi

          if [ -n "$remote_tag_sha" ] && [ "$remote_tag_sha" != "$head_sha" ]; then
            echo "::error::$TAG already exists at $remote_tag_sha, but release HEAD is $head_sha"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            local_tag_sha=$(git rev-list -n 1 "$TAG")
            if [ "$local_tag_sha" != "$head_sha" ]; then
              echo "::error::local $TAG points at $local_tag_sha, but release HEAD is $head_sha"
              exit 1
            fi
            echo "$TAG already exists locally at release HEAD"
          else
            git tag "$TAG" "$head_sha"
          fi

          if [ "$committed" = "true" ]; then
            git push origin HEAD:main
          fi

          if [ -z "$remote_tag_sha" ]; then
            git push origin "$TAG"
          else
            echo "$TAG already exists on origin at release HEAD; skipping tag push"
          fi

      - name: Build release notes from commit subjects
        env:
          PACKAGE: ${{ steps.version.outputs.package }}
          NEXT: ${{ steps.version.outputs.next }}
          TAG_PATTERN: ${{ steps.version.outputs.tag_pattern }}
        run: |
          PREV_TAG=$(git describe --tags --match "$TAG_PATTERN" --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          NOTES=$(git log --pretty=format:'- %s' "$RANGE" | grep -v "^- Bump $PACKAGE to" || true)
          if [ -z "$NOTES" ]; then
            NOTES="- Initial release"
          fi
          {
            echo "Packages:"
            echo "- $PACKAGE $NEXT"
            echo
            echo "Changes:"
            printf '%s\n' "$NOTES"
          } > RELEASE_NOTES.md

      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.release_title }}
        run: |
          gh_api_retry() {
            attempt=1
            while true; do
              if gh api "$@"; then
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep_seconds=$((attempt * 10))
              echo "gh api failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id_for_tag() {
            lookup_tag="$1"
            attempt=1
            while true; do
              error_file=$(mktemp)
              if release_id=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq ".[] | select(.tag_name == \"$lookup_tag\") | .id" 2>"$error_file"); then
                rm -f "$error_file"
                printf '%s\n' "$release_id" | head -n 1
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                cat "$error_file" >&2
                rm -f "$error_file"
                return 1
              fi
              cat "$error_file" >&2
              rm -f "$error_file"
              sleep_seconds=$((attempt * 10))
              echo "Release lookup failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id=$(release_id_for_tag "$TAG")
          if [ -n "$release_id" ]; then
            gh_api_retry --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f name="$RELEASE_TITLE" \
              -F body=@RELEASE_NOTES.md \
              --silent
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes-file RELEASE_NOTES.md \
              --draft
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/${{ steps.version.outputs.dist_prefix }}-${{ steps.version.outputs.next }}*
          if-no-files-found: error

  release-assets:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
          DIST_PREFIX: ${{ needs.release.outputs.dist_prefix }}
        run: |
          python3 - <<'PY'
          import json
          import mimetypes
          import os
          import pathlib
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          tag = os.environ["TAG"]
          api = f"https://api.github.com/repos/{repo}"
          uploads = f"https://uploads.github.com/repos/{repo}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "skillager-release-workflow",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request_json(method, url, *, data=None, extra_headers=None, retries=3):
              body = json.dumps(data).encode() if data is not None else None
              request_headers = dict(headers)
              if extra_headers:
                  request_headers.update(extra_headers)
              if body is not None:
                  request_headers["Content-Type"] = "application/json"
              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(url, data=body, headers=request_headers, method=method)
                  try:
                      with urllib.request.urlopen(request, timeout=60) as response:
                          if response.status == 204:
                              return None
                          return json.load(response)
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if attempt == retries:
                          raise SystemExit(f"{method} {url} failed with HTTP {exc.code}: {detail}") from exc
                  except urllib.error.URLError as exc:
                      if attempt == retries:
                          raise SystemExit(f"{method} {url} failed: {exc.reason}") from exc
                  time.sleep(attempt * 10)
              return None

          def request_binary(method, url, path, *, content_type, retries=3):
              data = path.read_bytes()
              request_headers = dict(headers)
              request_headers.update({"Content-Type": content_type, "Content-Length": str(len(data))})
              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(url, data=data, headers=request_headers, method=method)
                  try:
                      with urllib.request.urlopen(request, timeout=120) as response:
                          return json.load(response)
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if attempt == retries:
                          raise SystemExit(f"{method} {url} failed with HTTP {exc.code}: {detail}") from exc
                  except urllib.error.URLError as exc:
                      if attempt == retries:
                          raise SystemExit(f"{method} {url} failed: {exc.reason}") from exc
                  time.sleep(attempt * 10)
              return None

          releases = request_json("GET", f"{api}/releases?per_page=100")
          release = next((item for item in releases if item.get("tag_name") == tag), None)
          if not release:
              raise SystemExit(f"GitHub Release {tag} does not exist")
          release_id = release["id"]

          assets = request_json("GET", f"{api}/releases/{release_id}/assets?per_page=100") or []
          by_name = {asset.get("name"): asset for asset in assets}
          version = os.environ["VERSION"]
          dist_prefix = os.environ["DIST_PREFIX"]
          files = sorted(
              path
              for path in pathlib.Path("dist").iterdir()
              if path.is_file() and path.name.startswith(f"{dist_prefix}-{version}")
          )
          if len(files) != 2:
              raise SystemExit(f"expected exactly two release assets for {dist_prefix} {version}, found {len(files)}")

          for path in files:
              existing = by_name.get(path.name)
              if existing:
                  request_json("DELETE", f"{api}/releases/assets/{existing['id']}")
              encoded_name = urllib.parse.quote(path.name)
              content_type = mimetypes.guess_type(path.name)[0] or "application/octet-stream"
              upload_url = f"{uploads}/releases/{release_id}/assets?name={encoded_name}"
              request_binary("POST", upload_url, path, content_type=content_type)
              print(f"uploaded {path.name} to {tag}")
          PY

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.release.outputs.package }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Select package artifacts
        env:
          DIST_PREFIX: ${{ needs.release.outputs.dist_prefix }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir dist-package
          cp "dist/${DIST_PREFIX}-${VERSION}"* dist-package/
          # V1 release artifacts are exactly one wheel plus one sdist.
          test "$(find dist-package -type f | wc -l)" -eq 2

      - name: Check whether version is already on PyPI
        id: pypi
        env:
          PACKAGE: ${{ needs.release.outputs.package }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.request

          package = os.environ["PACKAGE"]
          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/{package}/{version}/json"
          exists = False
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"exists={str(exists).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY

      - name: Publish to PyPI
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist-package/

  publish-github-release:
    needs:
      - release
      - release-assets
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ needs.release.outputs.package }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh_api_retry() {
            attempt=1
            while true; do
              if gh api "$@"; then
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep_seconds=$((attempt * 10))
              echo "gh api failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id_for_tag() {
            lookup_tag="$1"
            attempt=1
            while true; do
              error_file=$(mktemp)
              if release_id=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq ".[] | select(.tag_name == \"$lookup_tag\") | .id" 2>"$error_file"); then
                rm -f "$error_file"
                printf '%s\n' "$release_id" | head -n 1
                return 0
              fi
              if [ "$attempt" -ge 3 ]; then
                cat "$error_file" >&2
                rm -f "$error_file"
                return 1
              fi
              cat "$error_file" >&2
              rm -f "$error_file"
              sleep_seconds=$((attempt * 10))
              echo "Release lookup failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          release_id=$(release_id_for_tag "$TAG")
          if [ -z "$release_id" ]; then
            echo "::error::GitHub Release $TAG does not exist"
            exit 1
          fi

          make_latest=false
          if [ "$PACKAGE" = "skillager" ]; then
            make_latest=true
          fi

          gh_api_retry --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false \
            -f make_latest="$make_latest" \
            --silent
